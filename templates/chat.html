{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 2rem auto; display: flex; flex-direction: column; height: 75vh;">
    <div style="border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem;">
        <h2><i class="fa-solid fa-robot"></i> Eureka AI Assistant</h2>
        <p style="margin: 0;">Ask anything about your travel plans.</p>
    </div>
    
    <div id="chatBox" style="flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; background-color: #f9f9f9; border-radius: 8px; margin-bottom: 1rem;">
        <!-- Messages -->
        <div style="align-self: flex-start; background-color: var(--white); padding: 1rem; border-radius: 12px; max-width: 80%; box-shadow: var(--card-shadow);">
            <p style="margin: 0;">Hello! I'm Eureka. How can I help you plan your next trip?</p>
        </div>
    </div>
    
    <div style="display: flex; gap: 0.5rem; position: relative;">
        <input type="text" id="chatInput" placeholder="Type your message here..." style="flex: 1; padding: 1rem; border: 1px solid var(--border-color); border-radius: 8px; outline: none;">
        
        <button id="micBtn" class="btn-secondary" title="Use Voice Input" style="padding: 1rem;">
            <i class="fa-solid fa-microphone"></i>
        </button>
        
        <button id="sendBtn" class="btn-primary" style="padding: 1rem 1.5rem;">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
    <div id="recordingStatus" style="display: none; color: red; font-size: 0.8rem; text-align: right; margin-top: 0.5rem;">
        Recording...
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
