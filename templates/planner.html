{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <h2 data-i18n="form_title">Plan Your Trip</h2>
        <p>Tell our AI about your dream trip, and we'll handle the rest.</p>
        
        <form id="plannerForm">
            <div class="form-group">
                <label for="destination" data-i18n="lbl_dest">Destination</label>
                <input type="text" id="destination" data-i18n="lbl_dest" placeholder="e.g. Paris, Goa, Tokyo" required>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label for="budget" data-i18n="lbl_budget">Total Budget (₹ INR)</label>
                    <input type="number" id="budget" placeholder="e.g. 1500" required>
                </div>
                
                <div class="form-group" style="flex: 1;">
                    <label for="days" data-i18n="lbl_days">Number of Days</label>
                    <input type="number" id="days" placeholder="e.g. 3" required>
                </div>
                
                <div class="form-group" style="flex: 1;">
                    <label for="people" data-i18n="lbl_people">Travelers</label>
                    <input type="number" id="people" placeholder="e.g. 2" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="preferences" data-i18n="lbl_prefs">Special Preferences (Optional)</label>
                <textarea id="preferences" rows="3" placeholder="e.g. Vegetarian food, love museums, avoid crowded places"></textarea>
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%;" data-i18n="btn_plan">Generate My Trip</button>
        </form>
    </div>
    
    <div id="loadingState" class="loader-container">
        <div class="spinner"></div>
        <h3>AI is crafting your perfect trip...</h3>
        <p>This may take up to 20 seconds.</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/planner.js') }}"></script>
{% endblock %}
